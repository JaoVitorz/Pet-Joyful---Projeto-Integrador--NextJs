name: Frontend Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do Next.js
        run: npm run build

      - name: Testes (se tiver)
        run: npm test || echo "Sem testes configurados"

      # 🔥 Versionamento automático
      - name: Instalar semver
        run: npm install -g semver

      - name: Calcular versão
        id: versioning
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LAST_TAG#v}
          NEW_VERSION=$(semver -i patch $CURRENT)
          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Criar TAG
        run: |
          git tag ${{ steps.versioning.outputs.new_version }}
          git push origin ${{ steps.versioning.outputs.new_version }}

      # 🔍 SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


      - name: Enviar e-mail em caso de falha
  if: failure()
  uses: dawidd6/action-send-mail@v3
  with:
    server_address: smtp.gmail.com
    server_port: 587
    username: ${{ secrets.EMAIL_USERNAME }}
    password: ${{ secrets.EMAIL_PASSWORD }}
    subject: "❌ Pipeline falhou - ${{ github.repository }}"
    body: |
      O pipeline falhou!

      Repositório: ${{ github.repository }}
      Branch: ${{ github.ref_name }}
      Autor: ${{ github.actor }}

      🔗 Ver detalhes:
      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    to: ${{ secrets.EMAIL_USERNAME }}
    from: ${{ secrets.EMAIL_USERNAME }}


 docker-build:
  name: Build da imagem Docker (Frontend)
  runs-on: ubuntu-latest
  needs: [version]

  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Instalar semver
      run: npm install -g semver

    - name: Criar nova tag caso não exista
      run: |
        if [ -z "$(git tag)" ]; then
          git tag v0.0.1
          git push origin v0.0.1
        fi

    - name: Calcular nova versão (igual backend)
      id: versioning
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

        COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

        BUMP="patch"
        if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
          BUMP="major"
        elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
          BUMP="minor"
        fi

        CURRENT=${LAST_TAG#v}
        NEW_VERSION=$(semver -i $BUMP $CURRENT)

        echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Definir o nome do repositório
      id: repo
      run: |
        REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/pet-joyful-frontend"
        echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

    - name: Criar imagem docker
      run: |
        NEW_VERSION=${{ steps.versioning.outputs.new_version }}
        REPO_NAME=${{ steps.repo.outputs.repo_name }}

        docker build \
          --tag ${REPO_NAME}:${NEW_VERSION} \
          --tag ${REPO_NAME}:latest \
          .

    - name: Efetuar push da imagem
      run: |
        NEW_VERSION=${{ steps.versioning.outputs.new_version }}
        REPO_NAME=${{ steps.repo.outputs.repo_name }}

        docker push ${REPO_NAME}:${NEW_VERSION}
        docker push ${REPO_NAME}:latest

   