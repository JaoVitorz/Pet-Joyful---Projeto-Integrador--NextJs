name: Frontend Release

on:
  push:
    branches:
      - main

permissions:
  contents: write      
       
jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.versioning.outputs.new_version }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install
        working-directory: ./pet-joyful

      - name: Build do Next.js
        run: npm run build
        working-directory: ./pet-joyful

      - name: Testes (se tiver)
        run: npm test || echo "Sem testes configurados"

      # 🔥 Versionamento automático (igual backend)
      - name: Instalar semver
        run: npm install -g semver

      - name: Calcular versão
        id: versioning
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          CURRENT=${LAST_TAG#v}
          NEW_VERSION=$(semver -i $BUMP $CURRENT)

          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Criar TAG
        run: |
          TAG=${{ steps.versioning.outputs.new_version }}
        
           if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
             echo "Tag $TAG já existe no remoto. Pulando..."
           else
             git tag $TAG
             git push origin $TAG
           fi


          
      # 🔍 SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 📩 EMAIL ERRO
      - name: Enviar e-mail em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Pipeline FRONTEND falhou"
          body: |
            Pipeline do frontend falhou!

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Autor: ${{ github.actor }}

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      # 📩 EMAIL SUCESSO
      - name: Enviar e-mail em caso de sucesso
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Pipeline FRONTEND OK"
          body: |
            Pipeline executado com sucesso 🚀

            Versão: ${{ steps.versioning.outputs.new_version }}

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

  docker-build:
    name: Build da imagem Docker (Frontend)
    runs-on: ubuntu-latest
    needs: [version]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Definir o nome do repositório
        id: repo
        run: |
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/pet-joyful-frontend"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Criar imagem docker
        run: |
          NEW_VERSION=${{ needs.version.outputs.new_version }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker build \
            --tag ${REPO_NAME}:${NEW_VERSION} \
            --tag ${REPO_NAME}:latest \
            .

      - name: Efetuar push da imagem
        run: |
          NEW_VERSION=${{ needs.version.outputs.new_version }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker push ${REPO_NAME}:${NEW_VERSION}
          docker push ${REPO_NAME}:latest