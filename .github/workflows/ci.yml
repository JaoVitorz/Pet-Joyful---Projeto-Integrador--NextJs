name: Frontend Release

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.versioning.outputs.new_version }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Instalar dependências
        working-directory: ./pet-joyful
        run: npm install

      - name: Build do Next.js
        working-directory: ./pet-joyful
        run: npm run build

      - name: Rodar testes
        working-directory: ./pet-joyful
        run: npm test || echo "Sem testes configurados"

      - name: Instalar semver
        run: npm install -g semver

      - name: Calcular versão
        id: versioning
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|^BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          CURRENT=${LAST_TAG#v}
          NEW_VERSION=$(semver -i $BUMP $CURRENT)

          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Criar TAG
        run: |
          TAG=${{ steps.versioning.outputs.new_version }}

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG já existe."
          else
            git tag $TAG
            git push origin $TAG
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Enviar e-mail em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Pipeline FRONTEND falhou"
          body: |
            Pipeline do frontend falhou!

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Autor: ${{ github.actor }}

            Link:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

      - name: Enviar e-mail em caso de sucesso
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Pipeline FRONTEND OK"
          body: |
            Pipeline executado com sucesso 🚀

            Versão:
            ${{ steps.versioning.outputs.new_version }}

            Link:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest

    needs: [version]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Definir repositório Docker
        id: repo
        run: |
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/pet-joyful-frontend"
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Criar imagem docker
        run: |
          NEW_VERSION=${{ needs.version.outputs.new_version }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker build \
            --tag ${REPO_NAME}:${NEW_VERSION} \
            --tag ${REPO_NAME}:latest \
            ./pet-joyful

      - name: Push imagem docker
        run: |
          NEW_VERSION=${{ needs.version.outputs.new_version }}
          REPO_NAME=${{ steps.repo.outputs.repo_name }}

          docker push ${REPO_NAME}:${NEW_VERSION}
          docker push ${REPO_NAME}:latest

  deploy-hml:
    name: CD - Deploy HML
    runs-on: ubuntu-latest

    needs: [version, docker-build]

    if: github.ref_name == 'develop' || github.ref_name == 'main'

    environment:
      name: hml
      url: https://web-hml-pet-joyful.onrender.com

    steps:
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy HML via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d87q5djeo5us738iapm0
          NEW_VERSION: ${{ needs.version.outputs.new_version }}

        run: |
          PAYLOAD=$(jq -n \
            --arg image "docker.io/joaovitorjesus/pet-joyful-frontend:${NEW_VERSION}" \
            '{
              clearCache: "clear",
              imageUrl: $image,
              overrideImage: true,
              imagePullPolicy: "Always"
            }')

          echo "Iniciando deploy HML Frontend - versão ${NEW_VERSION}..."

          curl -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "$PAYLOAD"

  deploy-prod:
    name: CD - Deploy PROD
    runs-on: ubuntu-latest

    needs: [version, deploy-hml]

    if: github.ref_name == 'main'

    environment:
      name: prod
      url: https://web-prod-pet-joyful.onrender.com

    steps:
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy PROD via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d871l5hs16ns73b17hhg
          NEW_VERSION: ${{ needs.version.outputs.new_version }}

        run: |
          PAYLOAD=$(jq -n \
            --arg image "docker.io/joaovitorjesus/pet-joyful-frontend:${NEW_VERSION}" \
            '{
              clearCache: "clear",
              imageUrl: $image,
              overrideImage: true,
              imagePullPolicy: "Always"
            }')

          echo "Iniciando deploy PROD Frontend - versão ${NEW_VERSION}..."

          curl -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -d "$PAYLOAD"

      - name: Notificação Discord
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deploy PROD concluído - Frontend",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Versão",
                    "value": "`${{ needs.version.outputs.new_version }}`",
                    "inline": true
                  },
                  {
                    "name": "Autor",
                    "value": "${{ github.actor }}",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "GitHub Actions • Pet Joyful Frontend"
                }
              }]
            }'